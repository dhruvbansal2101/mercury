local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: True
      global_frame: odom
      robot_base_frame: base_link

      update_frequency: 10.0
      publish_frequency: 5.0

      rolling_window: true
      width: 5
      height: 5
      resolution: 0.05

      footprint: "[[0.25, 0.20], [0.25, -0.20], [-0.25, -0.20], [-0.25, 0.20]]"
      footprint_padding: 0.02

      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          sensor_frame: lidar_link
          data_type: LaserScan
          max_obstacle_height: 2.0
          min_obstacle_height: 0.05
          obstacle_min_range: 0.2
          obstacle_max_range: 5.0       # increased from 3.5 → marks obstacles earlier
          observation_persistence: 0.2
          clearing: True
          marking: True
          raytrace_min_range: 0.10
          raytrace_max_range: 5.5       # slightly beyond obstacle_max_range
          inf_is_valid: True

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.35
        cost_scaling_factor: 3.0