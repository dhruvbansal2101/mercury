global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: True
      global_frame: map
      robot_base_frame: base_link

      update_frequency: 3.0
      publish_frequency: 2.0

      resolution: 0.05

      # CRITICAL FIX: Must be large enough to contain the goal.
      # Robot starts at (0,0) and goal is (26,-7).
      # Distance = sqrt(26^2 + 7^2) = 26.9m
      # Use 70x70m to comfortably cover the full track.
      # At 0.05m resolution: 1400x1400 cells — heavier but necessary.
      # If performance is too slow, use rolling_window: false and a
      # static map instead.
      rolling_window: true
      width: 70
      height: 70

      track_unknown_space: true

      footprint: "[[0.25, 0.24], [0.25, -0.24], [-0.25, -0.24], [-0.25, 0.24]]"
      footprint_padding: 0.05

      plugins: ["obstacle_layer", "inflation_layer"]

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          data_type: LaserScan
          max_obstacle_height: 2.0
          min_obstacle_height: 0.05
          clearing: True
          marking: True
          raytrace_min_range: 0.0
          raytrace_max_range: 10.0
          obstacle_min_range: 0.15
          obstacle_max_range: 8.0
          # Keep obstacles in map for 2s to handle occlusion on curves
          observation_persistence: 2.0
          inf_is_valid: True

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        # 0.35m inflation — enough to avoid obstacles without over-constraining
        # the path near lane edges.
        inflation_radius: 0.35
        cost_scaling_factor: 2.5