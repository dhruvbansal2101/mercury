global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: True
      global_frame: map
      robot_base_frame: base_link

      update_frequency: 3.0
      publish_frequency: 2.0

      resolution: 0.05

      rolling_window: true
      width: 70
      height: 70

      track_unknown_space: true

      footprint: "[[0.25, 0.24], [0.25, -0.24], [-0.25, -0.24], [-0.25, 0.24]]"
      footprint_padding: 0.05

      plugins: ["lane_layer", "obstacle_layer", "inflation_layer"]

      # ── Lane boundary layer ──────────────────────────────────────────────
      # Published by lane_costmap_node with TRANSIENT_LOCAL durability (latched).
      # Nav2 StaticLayer subscribes once and re-reads on each update.
      lane_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_topic: /perception/road_costmap
        subscribe_to_updates: true
        enabled: true
        # MUST be true for a latched/transient-local publisher.
        # Without this the StaticLayer misses the first (and only) publish.
        map_subscribe_transient_local: true
        # -1 in our OccupancyGrid = unknown, let it pass through as-is.
        unknown_cost_value: -1
        # Cells with value >= 100 are lethal in the costmap.
        lethal_cost_threshold: 100

      # ── LiDAR obstacle layer ─────────────────────────────────────────────
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          data_type: LaserScan
          max_obstacle_height: 2.0
          min_obstacle_height: 0.05
          clearing: True
          marking: True
          raytrace_min_range: 0.0
          raytrace_max_range: 10.0
          obstacle_min_range: 0.15
          obstacle_max_range: 8.0
          observation_persistence: 2.0
          inf_is_valid: True

      # ── Inflation layer ──────────────────────────────────────────────────
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.35
        cost_scaling_factor: 2.5